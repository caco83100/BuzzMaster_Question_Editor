name: Deploy to GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Workaround npm optional deps bug (native linux bindings)
        run: npm i @rollup/rollup-linux-x64-gnu @rolldown/binding-linux-x64-gnu --no-save

      - name: Run postinstall scripts
        run: npm run postinstall

      - name: Build SPA for GitHub Pages
        run: npx quasar build -m spa
        env:
          GH_PAGES: "true"
          GH_PAGES_REPO: ${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/spa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
