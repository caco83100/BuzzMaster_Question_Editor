name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Workaround npm optional deps bug (rollup linux binary)
        run: npm i @rollup/rollup-linux-x64-gnu --no-save

      - name: Run postinstall scripts
        run: npm run postinstall

      - name: Run Prettier
        run: npm run format:check

      - name: Run Lint
        run: npm run lint

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Workaround npm optional deps bug (rollup linux binary)
        run: npm i @rollup/rollup-linux-x64-gnu --no-save

      - name: Run postinstall scripts
        run: npm run postinstall

      - name: Run Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Workaround npm optional deps bug (rollup linux binary)
        run: npm i @rollup/rollup-linux-x64-gnu --no-save

      - name: Run postinstall scripts
        run: npm run postinstall

      - name: Test
        run: npm run test:unit:ci

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Workaround npm optional deps bug (rollup linux binary)
        run: npm i @rollup/rollup-linux-x64-gnu --no-save

      - name: Run postinstall scripts
        run: npm run postinstall

      - name: Build
        run: npm run build
